name: Prepare semantic releases

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  actions: write
  contents: write
  pull-requests: write

concurrency:
  group: semantic-release-pr
  cancel-in-progress: true

jobs:
  prepare:
    runs-on: ubuntu-latest
    env:
      RELEASE_PR_TOKEN_CONFIGURED: ${{ secrets.RELEASE_PR_TOKEN != '' }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - id: plan
        name: Discover changes and prepare versions
        run: npm run release:plan
      - name: Validate generated release changes
        if: steps.plan.outputs.changed == 'true'
        run: npm run check:js
      - id: release-pr
        name: Open or update the release PR
        if: steps.plan.outputs.changed == 'true'
        uses: peter-evans/create-pull-request@5f6978faf089d4d20b00c7766989d076bb2fc7f1 # v8.1.1
        with:
          token: ${{ secrets.RELEASE_PR_TOKEN || github.token }}
          branch: release/auto
          delete-branch: true
          commit-message: "chore(release): prepare component releases"
          title: "chore(release): prepare component releases"
          body: |
            Automated semantic release proposal.

            Versions are inferred from Conventional Commits and changed component paths.
            Merging this PR publishes every entry in `.release-plan.json` idempotently.
      - name: Dispatch CI for the bot-created branch
        if: >-
          env.RELEASE_PR_TOKEN_CONFIGURED != 'true' &&
          (steps.release-pr.outputs.pull-request-operation == 'created' ||
          steps.release-pr.outputs.pull-request-operation == 'updated')
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh workflow run ci.yml --ref release/auto
