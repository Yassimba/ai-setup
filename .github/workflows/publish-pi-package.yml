name: Publish semantic release plan

on:
  workflow_run:
    workflows: [CI]
    types: [completed]
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: semantic-publishing
  cancel-in-progress: false

jobs:
  resolve:
    if: >-
      (github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success') ||
      (github.event_name == 'workflow_dispatch' && github.ref == 'refs/heads/main')
    runs-on: ubuntu-latest
    outputs:
      publish: ${{ steps.detect.outputs.publish }}
      release_sha: ${{ steps.detect.outputs.release_sha }}
      npm: ${{ steps.resolve.outputs.npm }}
      npm_count: ${{ steps.resolve.outputs.npmCount }}
      source: ${{ steps.resolve.outputs.source }}
      source_count: ${{ steps.resolve.outputs.sourceCount }}
      binary_components: ${{ steps.resolve.outputs.binaryComponents }}
      binary_components_count: ${{ steps.resolve.outputs.binaryComponentsCount }}
      binaries: ${{ steps.resolve.outputs.binaries }}
      binaries_count: ${{ steps.resolve.outputs.binariesCount }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}
      - id: detect
        name: Detect a newly merged release plan
        run: |
          if [ "$GITHUB_EVENT_NAME" = workflow_dispatch ]; then
            echo "publish=true" >> "$GITHUB_OUTPUT"
            echo "release_sha=$(git log -1 --format=%H -- .release-plan.json)" >> "$GITHUB_OUTPUT"
          elif git diff-tree --no-commit-id --name-only -r -m HEAD | grep -Fx .release-plan.json; then
            echo "publish=true" >> "$GITHUB_OUTPUT"
            echo "release_sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"
          else
            echo "publish=false" >> "$GITHUB_OUTPUT"
          fi
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        if: steps.detect.outputs.publish == 'true'
        with:
          node-version: 24
      - id: resolve
        if: steps.detect.outputs.publish == 'true'
        run: node scripts/resolve-release.mjs

  npm:
    needs: resolve
    permissions:
      contents: write
      id-token: write
    if: needs.resolve.outputs.publish == 'true' && needs.resolve.outputs.npm_count != '0'
    name: npm · ${{ matrix.id }}
    runs-on: ubuntu-latest
    env:
      NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJSON(needs.resolve.outputs.npm) }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          ref: ${{ needs.resolve.outputs.release_sha }}
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org
          cache: npm
      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6
        if: matrix.id == 'mindwalk'
        with:
          go-version-file: plugins/mindwalk/go.mod
          cache: false
      - run: npm ci
      - name: Publish idempotently
        env:
          PACKAGE_NAME: ${{ matrix.name }}
          PACKAGE_VERSION: ${{ matrix.version }}
          PACKAGE_PATH: ${{ matrix.path }}
        run: |
          npm view "$PACKAGE_NAME@$PACKAGE_VERSION" version >/dev/null 2>&1 \
            || npm publish "./$PACKAGE_PATH" --access public --provenance
      - name: Tag and create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_SHA: ${{ needs.resolve.outputs.release_sha }}
          TAG: ${{ matrix.tag }}
        run: |
          git show "$GITHUB_SHA:scripts/ensure-github-release.sh" > "$RUNNER_TEMP/ensure-github-release.sh"
          bash "$RUNNER_TEMP/ensure-github-release.sh"

  source-releases:
    needs: resolve
    permissions:
      contents: write
    if: needs.resolve.outputs.publish == 'true' && needs.resolve.outputs.source_count != '0'
    name: source · ${{ matrix.id }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJSON(needs.resolve.outputs.source) }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          ref: ${{ needs.resolve.outputs.release_sha }}
      - name: Tag and create source release
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_SHA: ${{ needs.resolve.outputs.release_sha }}
          TAG: ${{ matrix.tag }}
        run: |
          git show "$GITHUB_SHA:scripts/ensure-github-release.sh" > "$RUNNER_TEMP/ensure-github-release.sh"
          bash "$RUNNER_TEMP/ensure-github-release.sh"

  create-binary-releases:
    needs: resolve
    permissions:
      contents: write
    if: needs.resolve.outputs.publish == 'true' && needs.resolve.outputs.binary_components_count != '0'
    name: release · ${{ matrix.id }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJSON(needs.resolve.outputs.binary_components) }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          ref: ${{ needs.resolve.outputs.release_sha }}
      - name: Create tag and release idempotently
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_SHA: ${{ needs.resolve.outputs.release_sha }}
          TAG: ${{ matrix.tag }}
        run: |
          git show "$GITHUB_SHA:scripts/ensure-github-release.sh" > "$RUNNER_TEMP/ensure-github-release.sh"
          bash "$RUNNER_TEMP/ensure-github-release.sh"

  binaries:
    needs: [resolve, create-binary-releases]
    permissions:
      contents: write
    if: needs.resolve.outputs.publish == 'true' && needs.resolve.outputs.binaries_count != '0'
    name: ${{ matrix.id }} · ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJSON(needs.resolve.outputs.binaries) }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ needs.resolve.outputs.release_sha }}
      - uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable
        with:
          toolchain: ${{ matrix.toolchain }}
      - uses: taiki-e/upload-rust-binary-action@f0d45ae91ee7b8ee928de7a9d04d893a08bcbec6 # v1
        with:
          bin: ${{ matrix.bin }}
          manifest-path: ${{ matrix.manifestPath }}
          target: ${{ matrix.target }}
          archive: $bin-$target
          checksum: sha256
          ref: refs/tags/${{ matrix.tag }}
          token: ${{ github.token }}

  continue-planning:
    permissions:
      actions: write
      contents: read
    if: >-
      always() && needs.resolve.outputs.publish == 'true' &&
      !contains(needs.*.result, 'failure') && !contains(needs.*.result, 'cancelled')
    needs: [resolve, npm, source-releases, create-binary-releases, binaries]
    runs-on: ubuntu-latest
    steps:
      - name: Check for changes that landed during publishing
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh workflow run release-pr.yml --repo "$GITHUB_REPOSITORY" --ref main
